services:

  - type: web
    name: mychat-v7-frontend
    runtime: static
    staticPublishPath: ./frontend
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(self), geolocation=()
      - path: /assets/*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: mychat-v7-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    pullRequestPreviewsEnabled: false
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_SSL
        value: true
      - key: ALLOWED_ORIGIN
        fromService:
          name: mychat-v7-frontend
          type: web
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: mychat-v7-db
          property: connectionString

databases:
  - name: mychat-v7-db
    plan: free
    databaseName: mychat
    user: mychat_user
